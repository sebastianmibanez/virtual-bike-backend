services:
  - type: web
    name: virtual-bike-backend
    runtime: node
    buildCommand: npm install && npx prisma generate && npx prisma db push
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: virtual_bike_db
          property: connectionString

databases:
  - name: virtual_bike_db
    databaseName: virtual_bike
    user: virtual_bike_user
    region: oregon
    postgreSQL:
      version: 15
